<!DOCTYPE html>
<html>
<head>
<title>Change Password | EduDOC</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at 15% 20%, #93c5fd55, transparent 45%),
radial-gradient(circle at 85% 15%, #c4b5fd55, transparent 45%),
radial-gradient(circle at 70% 85%, #86efac55, transparent 45%),
linear-gradient(135deg,#f8fbff,#f1f5ff,#faf7ff);
}

.glass-card{

width:420px;
padding:40px;

background:rgba(255,255,255,.85);
backdrop-filter:blur(18px);

border-radius:26px;
border:1px solid rgba(255,255,255,.8);

box-shadow:0 12px 40px rgba(0,0,0,.08);
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:10px;
text-align:center;
}

.subtitle{
text-align:center;
font-size:14px;
color:#64748b;
margin-bottom:30px;
}

.warning{
background:#fff7ed;
color:#9a3412;
padding:12px;
border-radius:12px;
font-size:13px;
margin-bottom:22px;
text-align:center;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
font-size:13px;
display:block;
margin-bottom:6px;
color:#475569;
}

.form-group input{

width:100%;
padding:12px 14px;

border-radius:12px;
border:1px solid #e2e8f0;

font-family:'Inter';
font-size:14px;
}

.form-group input:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 0 2px rgba(99,102,241,.1);
}

.btn-primary{

width:100%;
margin-top:10px;

padding:12px;

border:none;
border-radius:14px;

background:linear-gradient(135deg,#93c5fd,#a78bfa);

color:white;
font-weight:500;
font-size:15px;

cursor:pointer;
transition:.25s;
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.password-strength{

font-size:12px;
margin-top:6px;
color:#64748b;
}

</style>
</head>

<body>

<div class="glass-card">

<div class="logo">
EduDOC
</div>

<div class="subtitle">
Change your temporary password
</div>

<div class="warning">
For security reasons you must change the temporary password before continuing.
</div>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>New Password</label>
<input type="password" name="password" required>
<div class="password-strength">
Use at least 8 characters with letters and numbers.
</div>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" name="confirm_password" required>
</div>

<button class="btn-primary">
Update Password
</button>

</form>

</div>

</body>
</html>
