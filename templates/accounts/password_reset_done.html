<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Email Sent | EduDOC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at 20% 30%, #6366f1 0%, transparent 40%),
               radial-gradient(circle at 80% 70%, #a78bfa 0%, transparent 40%),
               linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* Floating decorative blur */
.shape{
    position:absolute;
    width:280px;
    height:280px;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.35;
    background:#6366f1;
    top:-60px;
    left:-60px;
}

.container{
    position:relative;
    z-index:2;
}

.card{
    width:420px;
    padding:45px;
    border-radius:24px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.85);
    box-shadow:0 30px 60px rgba(0,0,0,0.12);
    text-align:center;
    animation:fadeIn 0.6s ease;
}

h2{
    font-weight:600;
    margin-bottom:15px;
}

p{
    color:#475569;
    font-size:14px;
    margin-bottom:30px;
    line-height:1.6;
}

.button-group{
    display:flex;
    gap:12px;
    justify-content:center;
}

.btn{
    padding:12px 18px;
    border-radius:14px;
    font-size:14px;
    font-weight:500;
    text-decoration:none;
    transition:all 0.3s ease;
}

.btn-primary{
    background:linear-gradient(135deg,#6366f1,#4f46e5);
    color:white;
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 35px rgba(79,70,229,0.4);
}

.btn-outline{
    border:1px solid #cbd5e1;
    color:#334155;
    background:white;
}

.btn-outline:hover{
    background:#f1f5f9;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<div class="shape"></div>

<div class="container">
    <div class="card">
        <h2>Check Your Email</h2>
        <p>
            If an account with that email exists, a secure password reset link
            has been sent. Please check your inbox and spam folder.
        </p>

        <div class="button-group">
            <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                Back to Login
            </a>

            <a href="{% url 'accounts:home' %}" class="btn btn-outline">
                Go to Home
            </a>
        </div>
    </div>
</div>

</body>
</html>
